apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: experiments.ai.neuromorphic.dev
spec:
  group: ai.neuromorphic.dev
  scope: Namespaced
  names:
    plural: experiments
    singular: experiment
    kind: Experiment
    shortNames: [exp]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Strategy
          type: string
          jsonPath: .spec.strategy
        - name: Winner
          type: string
          jsonPath: .status.winner
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [strategy, primaryService, candidateService]
              properties:
                strategy:
                  type: string
                  enum: [ab, bandit, rl]
                primaryService:
                  type: string
                candidateService:
                  type: string
            status:
              type: object
              properties:
                winner:
                  type: string
