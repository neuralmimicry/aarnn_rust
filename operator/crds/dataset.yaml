apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: datasets.ai.neuromorphic.dev
spec:
  group: ai.neuromorphic.dev
  scope: Namespaced
  names:
    plural: datasets
    singular: dataset
    kind: Dataset
    shortNames: [ds]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                version:
                  type: string
                source:
                  type: string
                checksum:
                  type: string
