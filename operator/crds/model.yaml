apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: models.ai.neuromorphic.dev
spec:
  group: ai.neuromorphic.dev
  scope: Namespaced
  names:
    plural: models
    singular: model
    kind: Model
    shortNames: [mdl]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
                environment:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
