name: Container Build, Verify, and Promote

on:
  push:
    branches: ["engine", "main", "master"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_id:
        description: "Immutable build ID to promote (defaults to current SHA)"
        required: false
      environment:
        description: "Target environment"
        required: false
        type: choice
        options: [developer, alpha, beta, canary, test, pre-prod, prod, release, ui]
      track:
        description: "Release track"
        required: false
        type: choice
        options: [shadow, canary, blue, green]
      cargo_features:
        description: "Cargo features to build"
        required: false
        default: "all-features"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: neuralmimicry/aarnn_rust

jobs:
  build:
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - arch: amd64
            runner_arch: X64
          - arch: arm64
            runner_arch: ARM64
    runs-on: [self-hosted, Linux, "${{ matrix.runner_arch }}"]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Podman is available
        run: |
          command -v podman >/dev/null 2>&1 || {
            echo "podman is required on self-hosted runners."
            exit 1
          }
          podman --version

      - name: Configure rootless podman runtime environment
        run: |
          set -euo pipefail
          uid="$(id -u)"
          conf_dir="${HOME}/.config/containers"
          mkdir -p "${conf_dir}"

          # /run/user/<uid> is a tmpfs that vanishes after session logout or
          # reboot.  Fall back to a persistent /tmp directory and wire it into
          # both XDG_RUNTIME_DIR and storage.conf so podman uses it consistently.
          runtime_dir="/run/user/${uid}"
          if [[ ! -d "${runtime_dir}" ]] || [[ ! -w "${runtime_dir}" ]]; then
            runtime_dir="/tmp/podman-run-${uid}"
            mkdir -p "${runtime_dir}/containers"
            chmod 0700 "${runtime_dir}"
            echo "XDG_RUNTIME_DIR=${runtime_dir}" >> "${GITHUB_ENV}"
            # The graphroot database records the RunRoot path. When the previous
            # RunRoot (e.g. /run/user/<uid>) is gone, the stale DB causes podman
            # to ignore storage.conf and use the old non-writable path.  Remove
            # the stale database so podman starts fresh with our new config.
            rm -rf "${HOME}/.local/share/containers/storage" 2>/dev/null || true
            echo "Redirected XDG_RUNTIME_DIR -> ${runtime_dir}"
          fi

          # Write storage.conf and export the path so all subsequent podman
          # calls in this job pick up the config regardless of defaults.
          printf '[storage]\ndriver = "overlay"\nrunroot = "%s/containers"\ngraphroot = "%s/.local/share/containers/storage"\n' \
            "${runtime_dir}" "${HOME}" > "${conf_dir}/storage.conf"
          echo "CONTAINERS_STORAGE_CONF=${conf_dir}/storage.conf" >> "${GITHUB_ENV}"

          # Prefer crun; fall back to runc when crun is absent.
          if command -v crun >/dev/null 2>&1; then
            oci_runtime="crun"
          elif command -v runc >/dev/null 2>&1; then
            oci_runtime="runc"
          else
            echo "Neither crun nor runc found on PATH." >&2
            exit 1
          fi
          # cgroup_manager=cgroupfs avoids sd-bus/systemd dependency when there
          # is no active user session (non-login CI runners).
          printf '[engine]\nruntime = "%s"\ncgroup_manager = "cgroupfs"\n' "${oci_runtime}" > "${conf_dir}/containers.conf"
          echo "CONTAINERS_CONF=${conf_dir}/containers.conf" >> "${GITHUB_ENV}"

          export XDG_RUNTIME_DIR="${runtime_dir}"
          export CONTAINERS_STORAGE_CONF="${conf_dir}/storage.conf"
          export CONTAINERS_CONF="${conf_dir}/containers.conf"

          # Self-hosted runners can retain stale rootless Podman pause-process
          # state across jobs. Probe first, then migrate only when needed.
          if ! podman info >/dev/null 2>&1; then
            echo "Detected stale Podman state; running podman system migrate."
            podman system migrate
          fi
          podman info >/dev/null

          echo "OCI runtime: ${oci_runtime}"
          echo "RunRoot: ${runtime_dir}/containers"

      - name: Verify runner architecture matches matrix
        run: |
          HOST_ARCH="$(uname -m)"
          case "${HOST_ARCH}" in
            x86_64)
              HOST_TARGET_ARCH="amd64"
              ;;
            aarch64|arm64)
              HOST_TARGET_ARCH="arm64"
              ;;
            *)
              echo "Unsupported host architecture: ${HOST_ARCH}"
              exit 1
              ;;
          esac

          if [ "${HOST_TARGET_ARCH}" != "${{ matrix.arch }}" ]; then
            echo "Runner architecture mismatch: host=${HOST_TARGET_ARCH}, matrix=${{ matrix.arch }}"
            exit 1
          fi

      - name: Log in to GHCR
        run: |
          printf '%s' "${{ secrets.X_GITHUB_TOKEN }}" | podman login \
            "${{ env.REGISTRY }}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Derive immutable build id
        id: buildmeta
        run: |
          echo "build_id=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Prepare Debian package for container build
        run: |
          chmod +x scripts/package-release.sh scripts/prepare_container_package.sh
          ./scripts/prepare_container_package.sh \
            --workload standalone \
            --arch "${{ matrix.arch }}" \
            --output-dir ./dist/container \
            --cache-dir ./.container-cache/debs-ci \
            --force \
            --cargo-features "${{ github.event.inputs.cargo_features || 'all-features' }}" \
            --cargo-build-targets "aarnn_rust"

      - name: Smoke install container Debian package in Ubuntu 24.04
        run: |
          set -euo pipefail
          podman run --rm --pull=missing \
            --platform "linux/${{ matrix.arch }}" \
            -e DEBIAN_FRONTEND=noninteractive \
            -v "$PWD/dist/container:/tmp/aarnn:ro" \
            ubuntu:24.04 \
            bash -lc '
              set -euo pipefail
              arch="$(dpkg --print-architecture)"
              deb="$(find /tmp/aarnn -maxdepth 1 -type f -name "aarnn-rust_*_${arch}.deb" | head -n 1)"
              test -n "$deb"
              apt-get update
              apt-get install -y --no-install-recommends "$deb"
              test -x /usr/bin/aarnn_rust
            '

      - name: Build and push architecture image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          BUILD_ID="${{ steps.buildmeta.outputs.build_id }}"
          ARCH_TAG="${IMAGE}:${BUILD_ID}-${{ matrix.arch }}"

          build_args=(
            --file ./Containerfile
            --platform "linux/${{ matrix.arch }}"
            --tag "${ARCH_TAG}"
            --build-arg "CONTAINER_WORKLOAD=standalone"
            --build-arg "CARGO_FEATURES=${{ github.event.inputs.cargo_features || 'all-features' }}"
            --build-arg "PYTHON_MIN_VERSION=3.12"
            --build-arg "PYTHON_FULL_VERSION=3.12.2"
            .
          )

          set +e
          podman build "${build_args[@]}"
          build_rc=$?
          set -e

          if [ "${build_rc}" -ne 0 ]; then
            echo "Initial podman build failed (exit=${build_rc})."
            echo "Attempting one clean-cache rebuild (podman builder/image prune + --no-cache)."
            podman builder prune -f || true
            podman image prune -f || true
            podman build --no-cache "${build_args[@]}"
          fi

          podman push "${ARCH_TAG}"

  manifest:
    if: github.event_name == 'push'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    permissions:
      packages: write

    steps:
      - name: Verify Podman is available
        run: |
          command -v podman >/dev/null 2>&1 || {
            echo "podman is required on self-hosted runners."
            exit 1
          }
          podman --version

      - name: Configure rootless podman runtime environment
        run: |
          set -euo pipefail
          uid="$(id -u)"
          conf_dir="${HOME}/.config/containers"
          mkdir -p "${conf_dir}"
          runtime_dir="/run/user/${uid}"
          if [[ ! -d "${runtime_dir}" ]] || [[ ! -w "${runtime_dir}" ]]; then
            runtime_dir="/tmp/podman-run-${uid}"
            mkdir -p "${runtime_dir}/containers"
            chmod 0700 "${runtime_dir}"
            echo "XDG_RUNTIME_DIR=${runtime_dir}" >> "${GITHUB_ENV}"
            rm -rf "${HOME}/.local/share/containers/storage" 2>/dev/null || true
            echo "Redirected XDG_RUNTIME_DIR -> ${runtime_dir}"
          fi
          printf '[storage]\ndriver = "overlay"\nrunroot = "%s/containers"\ngraphroot = "%s/.local/share/containers/storage"\n' \
            "${runtime_dir}" "${HOME}" > "${conf_dir}/storage.conf"
          echo "CONTAINERS_STORAGE_CONF=${conf_dir}/storage.conf" >> "${GITHUB_ENV}"
          if command -v crun >/dev/null 2>&1; then
            oci_runtime="crun"
          elif command -v runc >/dev/null 2>&1; then
            oci_runtime="runc"
          else
            echo "Neither crun nor runc found on PATH." >&2
            exit 1
          fi
          printf '[engine]\nruntime = "%s"\ncgroup_manager = "cgroupfs"\n' "${oci_runtime}" > "${conf_dir}/containers.conf"
          echo "CONTAINERS_CONF=${conf_dir}/containers.conf" >> "${GITHUB_ENV}"

          export XDG_RUNTIME_DIR="${runtime_dir}"
          export CONTAINERS_STORAGE_CONF="${conf_dir}/storage.conf"
          export CONTAINERS_CONF="${conf_dir}/containers.conf"

          # Self-hosted runners can retain stale rootless Podman pause-process
          # state across jobs. Probe first, then migrate only when needed.
          if ! podman info >/dev/null 2>&1; then
            echo "Detected stale Podman state; running podman system migrate."
            podman system migrate
          fi
          podman info >/dev/null

          echo "OCI runtime: ${oci_runtime}"
          echo "RunRoot: ${runtime_dir}/containers"

      - name: Log in to GHCR
        run: |
          printf '%s' "${{ secrets.X_GITHUB_TOKEN }}" | podman login \
            "${{ env.REGISTRY }}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Assemble multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          BUILD=${GITHUB_SHA}

          podman manifest rm "${IMAGE}:${BUILD}" >/dev/null 2>&1 || true
          podman image rm -f "${IMAGE}:${BUILD}" >/dev/null 2>&1 || true
          podman manifest create "${IMAGE}:${BUILD}"
          podman manifest add "${IMAGE}:${BUILD}" "docker://${IMAGE}:${BUILD}-amd64"
          podman manifest add "${IMAGE}:${BUILD}" "docker://${IMAGE}:${BUILD}-arm64"
          podman manifest push --all "${IMAGE}:${BUILD}" "docker://${IMAGE}:${BUILD}"

      - name: Publish branch alias for developer flow
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          BUILD=${GITHUB_SHA}
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')

          podman manifest rm "${IMAGE}:${BRANCH_TAG}" >/dev/null 2>&1 || true
          podman image rm -f "${IMAGE}:${BRANCH_TAG}" >/dev/null 2>&1 || true
          podman manifest create "${IMAGE}:${BRANCH_TAG}"
          podman manifest add "${IMAGE}:${BRANCH_TAG}" "docker://${IMAGE}:${BUILD}-amd64"
          podman manifest add "${IMAGE}:${BRANCH_TAG}" "docker://${IMAGE}:${BUILD}-arm64"
          podman manifest push --all "${IMAGE}:${BRANCH_TAG}" "docker://${IMAGE}:${BRANCH_TAG}"

      - name: Publish version and latest tags on release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          BUILD=${GITHUB_SHA}
          VERSION_TAG="${GITHUB_REF_NAME}"

          # Semver tag (e.g. v0.1.2)
          podman manifest rm "${IMAGE}:${VERSION_TAG}" >/dev/null 2>&1 || true
          podman image rm -f "${IMAGE}:${VERSION_TAG}" >/dev/null 2>&1 || true
          podman manifest create "${IMAGE}:${VERSION_TAG}"
          podman manifest add "${IMAGE}:${VERSION_TAG}" "docker://${IMAGE}:${BUILD}-amd64"
          podman manifest add "${IMAGE}:${VERSION_TAG}" "docker://${IMAGE}:${BUILD}-arm64"
          podman manifest push --all "${IMAGE}:${VERSION_TAG}" "docker://${IMAGE}:${VERSION_TAG}"

          # latest always points to the newest release
          podman manifest rm "${IMAGE}:latest" >/dev/null 2>&1 || true
          podman image rm -f "${IMAGE}:latest" >/dev/null 2>&1 || true
          podman manifest create "${IMAGE}:latest"
          podman manifest add "${IMAGE}:latest" "docker://${IMAGE}:${BUILD}-amd64"
          podman manifest add "${IMAGE}:latest" "docker://${IMAGE}:${BUILD}-arm64"
          podman manifest push --all "${IMAGE}:latest" "docker://${IMAGE}:latest"
          echo "Published ${IMAGE}:${VERSION_TAG} and ${IMAGE}:latest"

      - name: Verify published manifests include amd64 and arm64
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          BUILD=${GITHUB_SHA}

          verify_ref() {
            local ref="$1"
            local platform="$2"

            echo "Verifying ${ref} for ${platform}"
            podman pull --quiet --platform "${platform}" "docker://${ref}" >/dev/null
          }

          verify_ref "${IMAGE}:${BUILD}" "linux/amd64"
          verify_ref "${IMAGE}:${BUILD}" "linux/arm64"

          if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
            verify_ref "${IMAGE}:${BRANCH_TAG}" "linux/amd64"
            verify_ref "${IMAGE}:${BRANCH_TAG}" "linux/arm64"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            verify_ref "${IMAGE}:${GITHUB_REF_NAME}" "linux/amd64"
            verify_ref "${IMAGE}:${GITHUB_REF_NAME}" "linux/arm64"
            verify_ref "${IMAGE}:latest" "linux/amd64"
            verify_ref "${IMAGE}:latest" "linux/arm64"
          fi

  promote:
    if: github.event_name == 'workflow_dispatch' && inputs.environment != ''
    runs-on: [self-hosted, Linux, X64]
    permissions:
      packages: write

    steps:
      - name: Verify Podman is available
        run: |
          command -v podman >/dev/null 2>&1 || {
            echo "podman is required on self-hosted runners."
            exit 1
          }
          podman --version

      - name: Configure rootless podman runtime environment
        run: |
          set -euo pipefail
          uid="$(id -u)"
          conf_dir="${HOME}/.config/containers"
          mkdir -p "${conf_dir}"
          runtime_dir="/run/user/${uid}"
          if [[ ! -d "${runtime_dir}" ]] || [[ ! -w "${runtime_dir}" ]]; then
            runtime_dir="/tmp/podman-run-${uid}"
            mkdir -p "${runtime_dir}/containers"
            chmod 0700 "${runtime_dir}"
            echo "XDG_RUNTIME_DIR=${runtime_dir}" >> "${GITHUB_ENV}"
            rm -rf "${HOME}/.local/share/containers/storage" 2>/dev/null || true
            echo "Redirected XDG_RUNTIME_DIR -> ${runtime_dir}"
          fi
          printf '[storage]\ndriver = "overlay"\nrunroot = "%s/containers"\ngraphroot = "%s/.local/share/containers/storage"\n' \
            "${runtime_dir}" "${HOME}" > "${conf_dir}/storage.conf"
          echo "CONTAINERS_STORAGE_CONF=${conf_dir}/storage.conf" >> "${GITHUB_ENV}"
          if command -v crun >/dev/null 2>&1; then
            oci_runtime="crun"
          elif command -v runc >/dev/null 2>&1; then
            oci_runtime="runc"
          else
            echo "Neither crun nor runc found on PATH." >&2
            exit 1
          fi
          printf '[engine]\nruntime = "%s"\ncgroup_manager = "cgroupfs"\n' "${oci_runtime}" > "${conf_dir}/containers.conf"
          echo "CONTAINERS_CONF=${conf_dir}/containers.conf" >> "${GITHUB_ENV}"

          export XDG_RUNTIME_DIR="${runtime_dir}"
          export CONTAINERS_STORAGE_CONF="${conf_dir}/storage.conf"
          export CONTAINERS_CONF="${conf_dir}/containers.conf"

          # Self-hosted runners can retain stale rootless Podman pause-process
          # state across jobs. Probe first, then migrate only when needed.
          if ! podman info >/dev/null 2>&1; then
            echo "Detected stale Podman state; running podman system migrate."
            podman system migrate
          fi
          podman info >/dev/null

          echo "OCI runtime: ${oci_runtime}"
          echo "RunRoot: ${runtime_dir}/containers"

      - name: Log in to GHCR
        run: |
          printf '%s' "${{ secrets.X_GITHUB_TOKEN }}" | podman login \
            "${{ env.REGISTRY }}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Promote immutable build
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          BUILD="${{ inputs.build_id || github.sha }}"
          ENV="${{ inputs.environment }}"
          TRACK="${{ inputs.track || 'blue' }}"
          TARGET="${IMAGE}:${ENV}-${TRACK}"

          podman manifest rm "${TARGET}" >/dev/null 2>&1 || true
          podman image rm -f "${TARGET}" >/dev/null 2>&1 || true
          podman manifest create "${TARGET}"
          podman manifest add --all "${TARGET}" "docker://${IMAGE}:${BUILD}"
          podman manifest push --all "${TARGET}" "docker://${TARGET}"

          echo "Promoted ${IMAGE}:${BUILD} -> ${TARGET}"
