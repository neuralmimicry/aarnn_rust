name: Build and Release

on:
  pull_request:
    branches:
      - engine
      - main
      - master
  push:
    branches:
      - engine
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub release from the selected v* tag ref"
        required: true
        type: boolean
        default: false
      draft_release:
        description: "Mark a manually published release as draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark a manually published release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev protobuf-compiler

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check build
        run: cargo check --locked --all-targets

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Build release binaries
        run: cargo build --locked --release --bin aarnn_rust --bin web_ui

      - name: Smoke test CLI help
        run: cargo run --locked --release --bin aarnn_rust -- --help

      - name: Smoke test web UI help
        run: cargo run --locked --release --bin web_ui -- --help

      - name: Validate release script
        run: bash -n scripts/package-release.sh

  release-meta:
    name: Release Metadata
    needs: verify
    runs-on: ubuntu-24.04
    outputs:
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute artifact metadata
        id: meta
        shell: bash
        env:
          MANUAL_PUBLISH_REQUEST: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release || false }}
        run: |
          set -euo pipefail
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          short_sha="${GITHUB_SHA::0:7}"
          release_tag=""
          publish_release="false"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            artifact_version="${release_tag#v}"
            if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
              publish_release="true"
            elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && \
                    "${MANUAL_PUBLISH_REQUEST}" == "true" ]]; then
              publish_release="true"
            fi
          else
            artifact_version="${cargo_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi

          if [[ -n "$release_tag" && "$artifact_version" != "$cargo_version" ]]; then
            echo "::error::Tag ${release_tag} does not match Cargo.toml"
            echo "::error::version ${cargo_version}"
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$artifact_version" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"

  package-linux:
    name: Package Linux (${{ matrix.deb_arch }})
    needs:
      - verify
      - release-meta
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            deb_arch: amd64
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            deb_arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev protobuf-compiler dpkg-dev

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Package Linux release artifacts
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh \
            --version "${{ needs.release-meta.outputs.artifact_version }}" \
            --output-dir ./dist \
            --target-triple "${{ matrix.rust_target }}" \
            --platform "${{ matrix.platform }}" \
            --deb-arch "${{ matrix.deb_arch }}"

      - name: Validate Debian package metadata
        shell: bash
        run: |
          set -euo pipefail
          deb_path="$(find dist -maxdepth 1 -type f -name 'aarnn-rust_*.deb' | head -n 1)"
          if [[ -z "$deb_path" ]]; then
            echo "::error::Expected a Debian package under dist/"
            exit 1
          fi

          expected_version="$(basename "$deb_path" | sed -E 's/^aarnn-rust_(.*)_[^_]+\.deb$/\1/')"
          actual_package="$(dpkg-deb -f "$deb_path" Package)"
          actual_version="$(dpkg-deb -f "$deb_path" Version)"
          actual_arch="$(dpkg-deb -f "$deb_path" Architecture)"

          [[ "$actual_package" == "aarnn-rust" ]]
          [[ "$actual_version" == "$expected_version" ]]
          [[ "$actual_arch" == "${{ matrix.deb_arch }}" ]]

      - name: Smoke install Debian package
        shell: bash
        run: |
          set -euo pipefail
          deb_path="$(find dist -maxdepth 1 -type f -name 'aarnn-rust_*.deb' | head -n 1)"
          deb_path="$(readlink -f "$deb_path")"

          sudo apt-get update
          sudo apt-get install -y "$deb_path"

          test -x /usr/bin/aarnn_rust
          test -x /usr/bin/web_ui
          test -f /usr/share/aarnn-rust/config.json
          aarnn_rust --help >/dev/null
          web_ui --help >/dev/null
          dpkg-query -W -f='${Version}\n' aarnn-rust

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish Release
    needs:
      - release-meta
      - package-linux
    runs-on: ubuntu-24.04
    if: >-
      always() &&
      needs.release-meta.outputs.publish_release == 'true' &&
      needs.package-linux.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Validate publish target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.release-meta.outputs.release_tag }}" ]]; then
            echo "::error::Publishing requires a resolved v* tag"
            exit 1
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./dist

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          DRAFT_RELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release }}
          MANUAL_PRERELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find dist -type f -print0 | sort -z)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No packaged artifacts were downloaded"
            exit 1
          fi

          title="AARNN Rust ${RELEASE_TAG}"
          prerelease="${MANUAL_PRERELEASE}"
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" && "${RELEASE_TAG}" == *-* ]]; then
            prerelease="true"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
            exit 0
          fi

          args=(
            "${RELEASE_TAG}"
            "${files[@]}"
            --target "${GITHUB_SHA}"
            --title "${title}"
            --generate-notes
          )

          if [[ "${DRAFT_RELEASE}" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
