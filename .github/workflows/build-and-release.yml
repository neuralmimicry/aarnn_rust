name: Build and Release

on:
  pull_request:
    branches:
      - engine
      - main
      - master
  push:
    branches:
      - engine
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub release from the selected v* tag ref"
        required: true
        type: boolean
        default: false
      draft_release:
        description: "Mark a manually published release as draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark a manually published release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_FEATURES: all-features
  CARGO_BUILD_TARGETS: aarnn_rust web_ui
  UBUNTU_NATIVE_BUILD_DEPS: >-
    ca-certificates curl xz-utils build-essential pkg-config libssl-dev protobuf-compiler
    dpkg-dev clang libclang-dev cmake git perl python3 libnl-3-dev
    libnl-route-3-dev libudev-dev
    ocl-icd-opencl-dev libopenmpi-dev libopencv-dev libgtk-3-dev libasound2-dev
    libv4l-dev libgl1-mesa-dev libegl1-mesa-dev libx11-dev libxext-dev
    libxrender-dev libice-dev libsm-dev libxcursor-dev libxi-dev
    libxrandr-dev libxcomposite-dev libxdamage-dev libxfixes-dev
    libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libx11-xcb-dev
    libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev
    libfontconfig1-dev libfreetype6-dev

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  verify:
    name: Verify
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 90
    defaults:
      run:
        working-directory: repo-build-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false
          path: repo-build-release

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          # shellcheck disable=SC2086
          sudo apt-get install -y --no-install-recommends --allow-downgrades $UBUNTU_NATIVE_BUILD_DEPS

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "repo-build-release -> target"

      - name: Check formatting
        run: cargo fmt --check

      - name: Check build
        run: cargo check --locked --all-features --all-targets

      - name: Run tests
        run: cargo test --locked --all-features --all-targets

      - name: Build release binaries
        run: cargo build --locked --release --all-features --bin aarnn_rust --bin web_ui

      - name: Smoke test CLI help
        run: cargo run --locked --release --all-features --bin aarnn_rust -- --help

      - name: Smoke test web UI help
        run: cargo run --locked --release --all-features --bin web_ui -- --help

      - name: Validate release script
        run: bash -n scripts/package-release.sh

  release-meta:
    name: Release Metadata
    needs: verify
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: repo-build-release
    outputs:
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false
          path: repo-build-release

      - name: Compute artifact metadata
        id: meta
        shell: bash
        env:
          MANUAL_PUBLISH_REQUEST: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release || false }}
        run: |
          set -euo pipefail
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          short_sha="${GITHUB_SHA:0:7}"
          release_tag=""
          publish_release="false"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            artifact_version="${release_tag#v}"
            if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
              publish_release="true"
            elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && \
                    "${MANUAL_PUBLISH_REQUEST}" == "true" ]]; then
              publish_release="true"
            fi
          else
            artifact_version="${cargo_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi

          if [[ -n "$release_tag" && "$artifact_version" != "$cargo_version" ]]; then
            echo "::error::Tag ${release_tag} does not match Cargo.toml"
            echo "::error::version ${cargo_version}"
            exit 1
          fi

          {
            echo "release_tag=$release_tag"
            echo "artifact_version=$artifact_version"
            echo "publish_release=$publish_release"
          } >> "$GITHUB_OUTPUT"

  package-linux:
    name: Package Linux (${{ matrix.ubuntu_label }} ${{ matrix.deb_arch }})
    needs:
      - verify
      - release-meta
    runs-on: [self-hosted, Linux, "${{ matrix.runner_arch }}"]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_arch: X64
            ubuntu_series: "24.04"
            ubuntu_label: ubuntu24.04
            rust_target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            deb_arch: amd64
            container_platform: amd64
          - runner_arch: X64
            ubuntu_series: "25.04"
            ubuntu_label: ubuntu25.04
            rust_target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            deb_arch: amd64
            container_platform: amd64
          - runner_arch: ARM64
            ubuntu_series: "24.04"
            ubuntu_label: ubuntu24.04
            rust_target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            deb_arch: arm64
            container_platform: arm64
          - runner_arch: ARM64
            ubuntu_series: "25.04"
            ubuntu_label: ubuntu25.04
            rust_target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            deb_arch: arm64
            container_platform: arm64
    defaults:
      run:
        working-directory: repo-build-release
    env:
      PACKAGE_OUTPUT_DIR: /tmp/release-assets/${{ matrix.platform }}-${{ matrix.ubuntu_label }}
      CARGO_TARGET_DIR: /tmp/cargo-target/${{ matrix.platform }}-${{ matrix.ubuntu_label }}
      CONTAINER_CARGO_HOME: /tmp/cargo-home/${{ matrix.platform }}-${{ matrix.ubuntu_label }}
      CONTAINER_RUSTUP_HOME: /tmp/rustup-home/${{ matrix.platform }}-${{ matrix.ubuntu_label }}
      UBUNTU_CONTAINER_IMAGE: ubuntu:${{ matrix.ubuntu_series }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false
          path: repo-build-release

      - name: Verify Podman is available
        run: |
          command -v podman >/dev/null 2>&1 || {
            echo "podman is required on self-hosted runners."
            exit 1
          }
          podman --version

      - name: Configure rootless podman runtime environment
        shell: bash
        run: |
          set -euo pipefail
          uid="$(id -u)"
          conf_dir="${HOME}/.config/containers"
          mkdir -p "${conf_dir}"

          runtime_dir="/run/user/${uid}"
          if [[ ! -d "${runtime_dir}" ]] || [[ ! -w "${runtime_dir}" ]]; then
            runtime_dir="/tmp/podman-run-${uid}"
            mkdir -p "${runtime_dir}/containers"
            chmod 0700 "${runtime_dir}"
            echo "XDG_RUNTIME_DIR=${runtime_dir}" >> "${GITHUB_ENV}"
            rm -rf "${HOME}/.local/share/containers/storage" 2>/dev/null || true
            echo "Redirected XDG_RUNTIME_DIR -> ${runtime_dir}"
          fi

          printf '[storage]\ndriver = "overlay"\nrunroot = "%s/containers"\ngraphroot = "%s/.local/share/containers/storage"\n' \
            "${runtime_dir}" "${HOME}" > "${conf_dir}/storage.conf"
          echo "CONTAINERS_STORAGE_CONF=${conf_dir}/storage.conf" >> "${GITHUB_ENV}"

          if command -v crun >/dev/null 2>&1; then
            oci_runtime="crun"
          elif command -v runc >/dev/null 2>&1; then
            oci_runtime="runc"
          else
            echo "Neither crun nor runc found on PATH." >&2
            exit 1
          fi

          printf '[engine]\nruntime = "%s"\ncgroup_manager = "cgroupfs"\n' "${oci_runtime}" > "${conf_dir}/containers.conf"
          echo "CONTAINERS_CONF=${conf_dir}/containers.conf" >> "${GITHUB_ENV}"

          export XDG_RUNTIME_DIR="${runtime_dir}"
          export CONTAINERS_STORAGE_CONF="${conf_dir}/storage.conf"
          export CONTAINERS_CONF="${conf_dir}/containers.conf"

          if ! podman info >/dev/null 2>&1; then
            echo "Detected stale Podman state; running podman system migrate."
            podman system migrate
          fi
          podman info >/dev/null

      - name: Prepare packaging directories
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$PACKAGE_OUTPUT_DIR"
          mkdir -p \
            "$PACKAGE_OUTPUT_DIR" \
            "$CARGO_TARGET_DIR" \
            "$CONTAINER_CARGO_HOME" \
            "$CONTAINER_RUSTUP_HOME"

      - name: Package Linux release artifacts
        shell: bash
        run: |
          set -euo pipefail
          podman run --rm -i --pull=missing \
            --platform "linux/${{ matrix.container_platform }}" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e CARGO_HOME=/cargo \
            -e RUSTUP_HOME=/rustup \
            -e CARGO_TARGET_DIR=/target \
            -e UBUNTU_NATIVE_BUILD_DEPS="$UBUNTU_NATIVE_BUILD_DEPS" \
            -v "$PWD:/workspace:ro" \
            -v "$PACKAGE_OUTPUT_DIR:/out" \
            -v "$CARGO_TARGET_DIR:/target" \
            -v "$CONTAINER_CARGO_HOME:/cargo" \
            -v "$CONTAINER_RUSTUP_HOME:/rustup" \
            -w /workspace \
            "$UBUNTU_CONTAINER_IMAGE" \
            bash -s -- \
              "${{ matrix.rust_target }}" \
              "${{ needs.release-meta.outputs.artifact_version }}" \
              "${{ matrix.platform }}" \
              "${{ matrix.ubuntu_label }}" \
              "${{ matrix.deb_arch }}" \
              "${{ env.CARGO_FEATURES }}" \
              "${{ env.CARGO_BUILD_TARGETS }}" <<'SCRIPT'
          set -euo pipefail

          rust_target="$1"
          artifact_version="$2"
          platform="$3"
          artifact_suffix="$4"
          deb_arch="$5"
          cargo_features="$6"
          cargo_build_targets="$7"

          . /workspace/scripts/apt_retry.sh
          # shellcheck disable=SC2086
          aarnn_apt_install_with_retry -y --no-install-recommends --allow-downgrades $UBUNTU_NATIVE_BUILD_DEPS

          if [[ ! -x /cargo/bin/rustup ]]; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          fi

          . /cargo/env
          rustup target add "$rust_target"

          bash /workspace/scripts/package-release.sh \
            --version "$artifact_version" \
            --output-dir /out \
            --target-triple "$rust_target" \
            --platform "$platform" \
            --artifact-suffix "$artifact_suffix" \
            --deb-arch "$deb_arch" \
            --cargo-features "$cargo_features" \
            --cargo-build-targets "$cargo_build_targets"
          SCRIPT

      - name: Validate Debian package metadata
        shell: bash
        run: |
          set -euo pipefail
          podman run --rm -i --pull=missing \
            --platform "linux/${{ matrix.container_platform }}" \
            -e EXPECTED_VERSION="${{ needs.release-meta.outputs.artifact_version }}" \
            -e EXPECTED_SUFFIX="${{ matrix.ubuntu_label }}" \
            -e EXPECTED_ARCH="${{ matrix.deb_arch }}" \
            -v "$PACKAGE_OUTPUT_DIR:/packages:ro" \
            "$UBUNTU_CONTAINER_IMAGE" \
            bash -s -- <<'SCRIPT'
          set -euo pipefail

          deb_path="$(find /packages -maxdepth 1 -type f -name "aarnn-rust_*_${EXPECTED_SUFFIX}_${EXPECTED_ARCH}.deb" | head -n 1)"
          if [[ -z "$deb_path" ]]; then
            echo "::error::Expected a Debian package under /packages"
            exit 1
          fi

          expected_version="$(
            printf '%s' "$EXPECTED_VERSION" \
              | tr '-' '~' \
              | sed -E 's/[^A-Za-z0-9.+:~]+/./g; s/^[^A-Za-z0-9]+//; s/[^A-Za-z0-9]+$//'
          )"
          actual_package="$(dpkg-deb -f "$deb_path" Package)"
          actual_version="$(dpkg-deb -f "$deb_path" Version)"
          actual_arch="$(dpkg-deb -f "$deb_path" Architecture)"

          [[ "$actual_package" == "aarnn-rust" ]]
          [[ "$actual_version" == "$expected_version" ]]
          [[ "$actual_arch" == "$EXPECTED_ARCH" ]]
          SCRIPT

      - name: Smoke install Debian package
        shell: bash
        run: |
          set -euo pipefail
          podman run --rm -i --pull=missing \
            --platform "linux/${{ matrix.container_platform }}" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e EXPECTED_SUFFIX="${{ matrix.ubuntu_label }}" \
            -e EXPECTED_ARCH="${{ matrix.deb_arch }}" \
            -v "$PACKAGE_OUTPUT_DIR:/packages:ro" \
            -v "$PWD/scripts:/tmp/scripts:ro" \
            "$UBUNTU_CONTAINER_IMAGE" \
            bash -s -- <<'SCRIPT'
          set -euo pipefail

          . /tmp/scripts/apt_retry.sh
          deb_path="$(find /packages -maxdepth 1 -type f -name "aarnn-rust_*_${EXPECTED_SUFFIX}_${EXPECTED_ARCH}.deb" | head -n 1)"
          deb_path="$(readlink -f "$deb_path")"

          aarnn_apt_install_with_retry -y --allow-downgrades "$deb_path"

          test -x /usr/bin/aarnn_rust
          test -x /usr/bin/web_ui
          test -f /usr/share/aarnn-rust/config.json
          aarnn_rust --help >/dev/null
          web_ui --help >/dev/null
          dpkg-query -W -f='${Version}\n' aarnn-rust
          SCRIPT

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}-${{ matrix.ubuntu_label }}
          path: ${{ env.PACKAGE_OUTPUT_DIR }}/*
          if-no-files-found: error
          retention-days: 14

      - name: Restore workspace ownership
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -e "$GITHUB_WORKSPACE/repo-build-release" ]]; then
            chown -R 1000:1000 "$GITHUB_WORKSPACE/repo-build-release"
          fi

  publish-release:
    name: Publish Release
    needs:
      - release-meta
      - package-linux
    runs-on: [self-hosted, Linux, X64]
    if: >-
      always() &&
      needs.release-meta.outputs.publish_release == 'true' &&
      needs.package-linux.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Validate publish target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.release-meta.outputs.release_tag }}" ]]; then
            echo "::error::Publishing requires a resolved v* tag"
            exit 1
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          DRAFT_RELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release }}
          MANUAL_PRERELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find dist -type f -print0 | sort -z)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No packaged artifacts were downloaded"
            exit 1
          fi

          title="AARNN Rust ${RELEASE_TAG}"
          prerelease="${MANUAL_PRERELEASE}"
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" && "${RELEASE_TAG}" == *-* ]]; then
            prerelease="true"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
            exit 0
          fi

          args=(
            "${RELEASE_TAG}"
            "${files[@]}"
            --target "${GITHUB_SHA}"
            --title "${title}"
            --generate-notes
          )

          if [[ "${DRAFT_RELEASE}" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
