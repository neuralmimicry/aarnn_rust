    # Three distributed spheres replace the single elongated capsule: each
    # sphere has 1:1:1 aspect ratio, eliminating the eccentricity warning that
    # Webots raises when one body dimension >> others.
    boundingObject Group {
      children [
        Transform {
          translation 0.00760 0 0
          children [ Sphere { radius 0.00960 } ]
        }
        Transform {
          translation -0.01488 0 0
          children [ Sphere { radius 0.00800 } ]
        }
        Transform {
          translation -0.03472 0 0
          children [ Sphere { radius 0.00560 } ]
        }
      ]
    }

