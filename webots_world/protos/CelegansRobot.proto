      DistanceSensor {
        name "celegans_front"
        type "infra-red"
        translation 0.19000 0.0 0.00000
        lookupTable [
          0 1000 0
          1.40 0 0
        ]
      }
      DistanceSensor {
        name "celegans_front_left"
        type "infra-red"
