          radius 0.028
          height 0.34
        }
      }
      # Inertial + contact sensing
      Accelerometer {
        name "celegans_accel"
      }
      Gyro {
        name "celegans_gyro"
      }
      TouchSensor {
        name "celegans_bumper_front"
        type "bumper"
        translation 0.19 0.0 0.0
      }
      TouchSensor {
        name "celegans_bumper_rear"
        type "bumper"
        translation -0.19 0.0 0.0
      }
