apiVersion: v1
kind: Service
metadata:
  name: web-ui
  labels:
    app: neuromorphic
    role: web-ui
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: neuromorphic
    role: web-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  labels:
    app: neuromorphic
    role: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neuromorphic
      role: web-ui
  template:
    metadata:
      labels:
        app: neuromorphic
        role: web-ui
    spec:
      containers:
        - name: web-ui
          image: ghcr.io/neuralmimicry/aarnn_rust:latest
          command: ["./web_ui"]
          args: ["--listen", "0.0.0.0:8080", "--orchestrator", "http://orchestrator:50051"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: web-ui
  labels:
    app: neuromorphic
    role: web-ui
spec:
  to:
    kind: Service
    name: web-ui
    weight: 100
  port:
    targetPort: http
