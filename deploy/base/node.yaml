apiVersion: apps/v1
kind: Deployment
metadata:
  name: node
  labels:
    app: neuromorphic
    role: node
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neuromorphic
      role: node
  template:
    metadata:
      labels:
        app: neuromorphic
        role: node
    spec:
      containers:
        - name: neuromorphic
          image: ghcr.io/neuralmimicry/aarnn_rust:engine-node
          args: ["--node", "--orchestrator-addr", "http://orchestrator:50051"]
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
              # Hardware acceleration (example for NVIDIA GPU)
              # nvidia.com/gpu: 1
