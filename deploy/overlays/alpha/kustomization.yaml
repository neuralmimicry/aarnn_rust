apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: neuromorphic
resources:
  - ../../../../k8s/base/service.yaml
patches:
  - target:
      kind: Service
      name: neuromorphic-stable
    patch: |
      - op: replace
        path: /metadata/name
        value: neuromorphic-alpha
